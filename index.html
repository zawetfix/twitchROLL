<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twitch Розыгрыш</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect x='4' y='4' width='56' height='56' rx='14' fill='%23ff8c00'/><path d='M20 44 L20 16 L44 16 L44 36 L36 44 Z' fill='white'/><rect x='26' y='22' width='4' height='10' fill='%23ff8c00'/><rect x='34' y='22' width='4' height='10' fill='%23ff8c00'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0a0a;
  --bg2:      #111111;
  --bg3:      #161616;
  --card:     linear-gradient(to right, rgba(25,25,25,1), rgba(22,22,22,1) 33%, rgba(20,20,20,1) 66%, rgba(20,20,20,1));
  --border:   rgba(255,255,255,0.07);
  --border2:  rgba(255,255,255,0.12);
  --text:     #ffffff;
  --text-dim: #6B7280;
  --text-mid: #9ca3af;
  --orange:   #ff8c00;
  --orange2:  #ff6b00;
  --red:      #ef4444;
  --green:    #09e083;
  --radius:   16px;
  --radius-sm: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
*::-webkit-scrollbar { width: 4px; }
*::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
*::-webkit-scrollbar-track { background: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  height: 100vh;
  display: grid;
  grid-template-columns: 380px minmax(0,1fr) 340px;
  grid-template-rows: 64px 1fr 40px;
  gap: 10px;
  padding: 10px;
  overflow: hidden;
  letter-spacing: -0.01em;
  line-height: 1.4;
}

/* ── HEADER ── */
header {
  grid-column: 1 / -1;
  display: flex; align-items: center; gap: 12px;
  padding: 0 20px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.logo {
  font-family: 'Unbounded', sans-serif;
  font-size: 14px; font-weight: 800;
  color: var(--text); letter-spacing: .04em;
  display: flex; align-items: center; gap: 8px;
}
.logo-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  box-shadow: 0 0 8px rgba(255,140,0,0.5);
}
.hdot { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.15); }
.hstatus { font-size: 13px; color: var(--text-dim); font-weight: 500; }
.live-badge {
  margin-left: auto;
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; letter-spacing: .12em;
  color: var(--red); opacity: 0; transition: opacity .3s;
  background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
  padding: 4px 10px; border-radius: 20px;
}
.live-badge.on { opacity: 1; }
.live-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--red); animation: blink 1.5s ease infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

/* ── PANEL ── */
.panel {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex; flex-direction: column; overflow: hidden;
}
.ph {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  font-family: 'Unbounded', sans-serif;
  font-size: 10px; font-weight: 700;
  color: var(--text-dim); letter-spacing: .14em; text-transform: uppercase;
  flex-shrink: 0;
}
.ph-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: rgba(255,140,0,0.15);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ph-icon svg { stroke: var(--orange); }

/* ── LEFT CONTROLS ── */
.ctrl { padding: 16px; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }
label {
  font-size: 11px; color: var(--text-dim); letter-spacing: .06em;
  margin-bottom: 6px; display: block; text-transform: uppercase; font-weight: 600;
}

input[type=text] {
  width: 100%;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  color: var(--text); font-size: 14px; font-weight: 500;
  font-family: 'Inter', sans-serif;
  outline: none; transition: border-color .2s, opacity .2s;
}
input[type=text]:focus { border-color: rgba(255,140,0,0.4); }
input[type=text]::placeholder { color: var(--text-dim); }
input[type=text]:disabled {
  opacity: 0.4;
  cursor: not-allowed;
  border-color: rgba(255,255,255,0.05);
}

.btn {
  width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
  cursor: pointer; font-family: 'Unbounded', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .06em;
  transition: all .2s; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn svg { flex-shrink: 0; }
.btn-primary {
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  color: #ffffff;
  box-shadow: 0 4px 16px rgba(255,140,0,0.25);
}
.btn-primary:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,140,0,0.35); }
.btn-danger {
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.25);
  color: var(--red);
}
.btn-danger:hover { background: rgba(239,68,68,0.2); border-color: var(--red); }
.btn-case {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text); font-size: 11px;
}
.btn-case:hover:not(:disabled) { border-color: var(--orange); color: var(--orange); transform: translateY(-1px); }
.btn-case:disabled { opacity: .3; cursor: not-allowed; }
.btn-muted {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-dim); font-size: 11px;
}
.btn-muted:hover { border-color: rgba(255,255,255,0.15); color: var(--text-mid); }

.stat-block {
  background: rgba(255,140,0,0.08);
  border: 1px solid rgba(255,140,0,0.2);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 12px;
}
.stat-icon {
  width: 44px; height: 44px; border-radius: 12px;
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.stat-val {
  font-family: 'Unbounded', sans-serif;
  font-size: 26px; font-weight: 800; color: var(--text); line-height: 1;
}
.stat-lbl {
  font-size: 11px; color: var(--text-dim); letter-spacing: .04em;
  text-transform: uppercase; margin-top: 4px; font-weight: 500;
}

.err-box {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  border-radius: var(--radius-sm);
  padding: 12px 14px; font-size: 13px; color: #fca5a5; display: none;
  font-weight: 500;
}
.err-box.show { display: block; }
.divider { height: 1px; background: rgba(255,255,255,0.06); }

/* ── TOGGLE SWITCH ── */
.toggle-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 10px; padding: 10px 14px;
  background: rgba(0,0,0,0.25);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: var(--radius-sm);
}
.toggle-label {
  font-size: 12px; color: var(--text-mid); font-weight: 500; line-height: 1.4;
  text-transform: none; letter-spacing: 0; margin-bottom: 0; display: inline;
}
.toggle-switch {
  position: relative; width: 38px; height: 22px; flex-shrink: 0;
}
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer; inset: 0;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 11px; transition: .2s;
}
.toggle-slider:before {
  content: ''; position: absolute;
  width: 16px; height: 16px; left: 2px; top: 2px;
  background: var(--text-dim); border-radius: 50%; transition: .2s;
}
.toggle-switch input:checked + .toggle-slider { background: rgba(255,140,0,0.3); border-color: rgba(255,140,0,0.6); }
.toggle-switch input:checked + .toggle-slider:before { transform: translateX(16px); background: var(--orange); }

/* ── MODE SELECT ── */
.mode-row {
  display: flex; gap: 6px;
}
.mode-btn {
  flex: 1; padding: 8px 4px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(0,0,0,0.3);
  color: var(--text-dim);
  cursor: pointer; font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600; letter-spacing: .02em;
  text-align: center; transition: all .15s;
}
.mode-btn.active {
  border-color: rgba(255,140,0,0.5);
  background: rgba(255,140,0,0.12);
  color: var(--orange);
}

/* ── MIDDLE ── */
.mid { display: flex; flex-direction: column; gap: 10px; overflow: hidden; min-width: 0; }

/* ── MAIN CHAT ── */
.main-chat { flex: 1; min-height: 0; display: flex; flex-direction: column; overflow: hidden; }
.chat-box {
  flex: 1; overflow-y: auto; padding: 12px 16px;
  display: flex; flex-direction: column; gap: 3px;
}
.chat-msg {
  font-size: 13px; line-height: 1.5; animation: fadeUp .18s ease;
  word-wrap: break-word;
  padding: 2px 4px; border-radius: 3px;
  background: transparent !important;
}
@keyframes fadeUp { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:none} }
.chat-msg .nick { font-weight: 600; margin-right: 4px; }
.chat-msg .txt { color: rgba(255,255,255,0.85); }
.chat-msg.kw {
  background: rgba(255,140,0,0.06) !important;
  border-left: 2px solid rgba(255,140,0,0.5);
  padding: 3px 8px; border-radius: 4px;
}
/* Twitch badges */
.badge {
  display: inline-block; vertical-align: middle;
  width: 18px; height: 18px; margin: -2px 3px -2px 0;
  border-radius: 3px;
}
.badge svg { width: 18px; height: 18px; }
.emote {
  display: inline-block; vertical-align: middle;
  height: 26px; margin: -3px 1px;
  image-rendering: -webkit-optimize-contrast;
}
.empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--text-dim); font-size: 13px; gap: 12px; text-align: center; padding: 24px;
}
.empty-state svg { opacity: .15; }

/* ── PARTICIPANTS ── */
.plist {
  flex: 1; overflow-y: auto; padding: 10px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.pi {
  display: flex; align-items: center; gap: 9px;
  padding: 10px 12px;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px; animation: fadeUp .2s ease;
  transition: border-color .2s;
}
.pi.winner {
  border-color: rgba(255,140,0,0.4);
  background: rgba(255,140,0,0.06);
}
.pi .av {
  width: 28px; height: 28px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0; border: 1px solid;
}
.pi .pn {
  flex: 1; color: var(--text); font-size: 13px; font-weight: 500;
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.pi.winner .pn { color: var(--orange); font-weight: 600; }
.pi .crown { flex-shrink: 0; display: flex; align-items: center; }
.pi-x {
  width: 22px; height: 22px; border-radius: 50%;
  background: transparent; border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 11px; line-height: 1; flex-shrink: 0;
  transition: all .15s; font-family: 'Inter', sans-serif;
}
.pi-x:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.1); }
.pempty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%;
  color: var(--text-dim); font-size: 13px; gap: 12px; text-align: center; padding: 20px;
}
.pempty svg { opacity: .15; }

/* ── FOOTER ── */
footer {
  grid-column: 1 / -1;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: var(--text-dim); letter-spacing: .04em;
}
footer b { color: var(--orange); font-weight: 600; }

/* ── WINNER OVERLAY ── */
#winner-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 90;
  background: rgba(0,0,0,.88);
  backdrop-filter: blur(12px);
  align-items: center; justify-content: center;
  padding: 24px;
  animation: mfade .25s ease;
}
#winner-overlay.show { display: flex; }
@keyframes mfade { from{opacity:0} to{opacity:1} }

.win-card {
  background: #111111;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  width: 100%; max-width: 680px;
  max-height: 85vh;
  display: flex; flex-direction: column;
  box-shadow: 0 40px 120px rgba(0,0,0,.9);
  animation: popIn .35s cubic-bezier(.34,1.56,.64,1);
  overflow: hidden;
  position: relative;
}
@keyframes popIn { from{opacity:0;transform:scale(.85)} to{opacity:1;transform:scale(1)} }

.win-close {
  position: absolute; top: 14px; right: 14px;
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.06);
  color: rgba(255,255,255,0.4);
  font-size: 16px; cursor: pointer; z-index: 5;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; font-family: 'Inter', sans-serif;
}
.win-close:hover { border-color: var(--red); color: var(--red); background: rgba(239,68,68,0.12); }

.wb-banner {
  padding: 36px 28px 28px;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: relative; overflow: hidden;
}
.wb-banner::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at center top, rgba(255,140,0,.1), transparent 60%);
  pointer-events: none;
}
.wb-trophy { font-size: 40px; margin-bottom: 4px; display: flex; align-items: center; justify-content: center; }
.wb-label {
  font-size: 11px; color: var(--text-dim); letter-spacing: .18em;
  text-transform: uppercase; font-family: 'Unbounded', sans-serif; font-weight: 600;
}
.wb-name {
  font-family: 'Unbounded', sans-serif;
  font-size: 32px; font-weight: 800; color: var(--text);
  margin-top: 4px; word-break: break-all; text-align: center;
}
.wchat-box {
  flex: 1; min-height: 180px; overflow-y: auto;
  padding: 12px 18px 14px;
  display: flex; flex-direction: column; gap: 6px;
}
.wchat-empty { font-size: 12px; color: var(--text-dim); text-align: center; padding: 20px; }

/* ── CASE MODAL ── */
#case-modal {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.94); backdrop-filter: blur(8px);
  align-items: center; justify-content: center; flex-direction: column;
}
#case-modal.show { display: flex; animation: mfade .22s ease; }

.cm-box {
  background: #111111;
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 32px 32px 28px;
  display: flex; flex-direction: column; align-items: center; gap: 20px;
  box-shadow: 0 40px 100px rgba(0,0,0,.85);
  width: 90%; max-width: 700px;
  animation: popIn .28s cubic-bezier(.34,1.56,.64,1);
}

.cm-title {
  font-family: 'Unbounded', sans-serif;
  font-size: 13px; font-weight: 700; color: var(--text);
  letter-spacing: .06em;
  display: flex; align-items: center; gap: 8px;
}
.cm-count {
  font-size: 12px; color: var(--text-dim); margin-top: -14px;
}

/* ── CASE STRIP ── */
.case-wrap {
  width: 100%;
  position: relative;
  overflow: hidden;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(0,0,0,0.4);
}

.case-pointer {
  position: absolute;
  left: 50%; top: 0; bottom: 0;
  transform: translateX(-50%);
  width: 3px;
  background: var(--orange);
  z-index: 10;
  box-shadow: 0 0 12px rgba(255,140,0,0.7);
  pointer-events: none;
}
.case-pointer::before,
.case-pointer::after {
  content: '';
  position: absolute;
  left: 50%; transform: translateX(-50%);
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
}
.case-pointer::before {
  top: 0;
  border-top: 12px solid var(--orange);
}
.case-pointer::after {
  bottom: 0;
  border-bottom: 12px solid var(--orange);
}

.case-fade-left,
.case-fade-right {
  position: absolute; top: 0; bottom: 0; width: 80px; z-index: 5; pointer-events: none;
}
.case-fade-left  { left:  0; background: linear-gradient(to right, rgba(10,10,10,0.9), transparent); }
.case-fade-right { right: 0; background: linear-gradient(to left, rgba(10,10,10,0.9), transparent); }

.case-track-outer {
  overflow: hidden;
  padding: 12px 0;
}
.case-track {
  display: flex;
  gap: 8px;
  padding: 0 calc(50% - 52px);
  will-change: transform;
  transition: none;
}

.case-cell {
  flex-shrink: 0;
  width: 96px; height: 96px;
  border-radius: 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  position: relative;
  transition: border-color .2s;
}

.case-cell .av {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800;
  border: 2px solid;
}
.case-cell .nick-lbl {
  font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 600;
  max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  text-align: center;
}
.case-cell.highlight {
  border-color: var(--orange);
  background: rgba(255,140,0,0.1);
  box-shadow: 0 0 20px rgba(255,140,0,0.25);
}

.cm-btns { display: flex; flex-direction: column; gap: 8px; width: 100%; }
.btn-pick {
  width: 100%; padding: 14px; border: none; border-radius: var(--radius-sm);
  cursor: pointer; font-family: 'Unbounded', sans-serif;
  font-size: 11px; font-weight: 700; letter-spacing: .07em;
  background: linear-gradient(135deg, var(--orange), var(--orange2));
  color: #fff; transition: all .15s;
  box-shadow: 0 4px 16px rgba(255,140,0,0.25);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-pick:hover { filter: brightness(1.08); transform: translateY(-1px); }
.btn-pick:disabled { opacity: .3; cursor: not-allowed; transform: none; filter: none; box-shadow: none; }
.btn-close-cm {
  width: 100%; padding: 10px;
  border: 1px solid rgba(255,255,255,0.08);
  background: transparent; color: var(--text-dim);
  border-radius: var(--radius-sm); cursor: pointer;
  font-family: 'Unbounded', sans-serif; font-size: 10px; letter-spacing: .07em;
  transition: border-color .15s;
}
.btn-close-cm:hover { border-color: rgba(255,255,255,0.15); color: var(--text-mid); }
.btn-close-cm:disabled { opacity: .25; cursor: not-allowed; }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    TWITCH РОЗЫГРЫШ
  </div>
  <div class="hdot"></div>
  <span class="hstatus" id="hstatus">Не подключено</span>
  <div class="live-badge" id="live-badge">LIVE</div>
</header>

<!-- LEFT: CONTROLS -->
<div class="panel">
  <div class="ph">
    <div class="ph-icon">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
    </div>
    Управление
  </div>
  <div class="ctrl">
    <div>
      <label>Никнейм стримера</label>
      <input type="text" id="inp-ch" placeholder="channel" value="">
    </div>

    <!-- Mode selector -->
    <div>
      <label>Режим участия</label>
      <div class="mode-row">
        <button class="mode-btn active" id="mode-kw" onclick="setMode('keyword')">Ключевое слово</button>
        <button class="mode-btn" id="mode-any" onclick="setMode('any')">Любое слово</button>
      </div>
    </div>

    <div id="kw-field">
      <label>Ключевое слово</label>
      <input type="text" id="inp-kw" placeholder="розыгрыш" value="">
    </div>

<script>
let ws = null;
let participants = [];
let blacklist = new Set();
let winner = null;
let winnerName = null;
let caseSpinning = false;
let sevenTVEmotes = {};
let participationMode = 'keyword'; // 'keyword' or 'any'

// ── COLORS ─────────────────────────────────────────────
const COLORS = [
  '#e05555','#e07c2c','#d4a030','#9cb830',
  '#3ab870','#2a9ab0','#8850c8','#d04898',
  '#e06060','#d08060','#c8b040','#70c040',
  '#30a0d0','#9060e0','#e05080',
];

function nickColor(nick) {
  let h = 0; for (let c of nick) h = ((h<<5)-h) + c.charCodeAt(0);
  const idx = Math.abs(h) % COLORS.length;
  return COLORS[idx];
}

// ── MODE SWITCH ─────────────────────────────────────────
function setMode(mode) {
  participationMode = mode;
  document.getElementById('mode-kw').classList.toggle('active', mode === 'keyword');
  document.getElementById('mode-any').classList.toggle('active', mode === 'any');
  document.getElementById('kw-field').style.display = mode === 'keyword' ? 'block' : 'none';
}

// ── CASE STRIP ─────────────────────────────────────────
function buildTrack(winnerIdx) {
  const track = document.getElementById('case-track');
  track.innerHTML = '';
  track.style.transition = 'none';
  track.style.transform = 'translateX(0)';

  const cellW = 104;
  const totalCells = 60;
  const centerPos = Math.floor(totalCells / 2);

  const cells = [];
  for (let i = 0; i < totalCells; i++) {
    if (i === centerPos) {
      cells.push(participants[winnerIdx]);
    } else {
      const ri = Math.floor(Math.random() * participants.length);
      cells.push(participants[ri]);
    }
  }

  cells.forEach((nick, i) => {
    const cell = document.createElement('div');
    cell.className = 'case-cell';
    const color = nickColor(nick);
    const letter = nick[0].toUpperCase();
    cell.innerHTML = `
      <div class="av" style="background:${color}22;border-color:${color}66;color:${color}">${esc(letter)}</div>
      <div class="nick-lbl">${esc(nick)}</div>
    `;
    track.appendChild(cell);
  });

  return { track, centerPos, cellW };
}

document.getElementById('btn-open-case').addEventListener('click', () => {
  const n = participants.length;
  document.getElementById('cm-count').textContent = `${n} участник${plu(n)}`;
  buildTrack(0);
  document.getElementById('case-modal').classList.add('show');
});

document.getElementById('btn-close-cm').addEventListener('click', () => {
  if (!caseSpinning) document.getElementById('case-modal').classList.remove('show');
});
document.getElementById('case-modal').addEventListener('click', e => {
  if (e.target.id === 'case-modal' && !caseSpinning)
    document.getElementById('case-modal').classList.remove('show');
});

document.getElementById('btn-pick').addEventListener('click', () => {
  if (caseSpinning || !participants.length) return;
  caseSpinning = true;
  document.getElementById('btn-pick').disabled = true;
  document.getElementById('btn-close-cm').disabled = true;

  const winIdx = Math.floor(Math.random() * participants.length);
  const { track, centerPos, cellW } = buildTrack(winIdx);

  const randomOffset = (Math.random() - 0.5) * 40;
  const targetX = -(centerPos * cellW) + randomOffset;

  void track.offsetWidth;

  const startX = targetX + 2200 + Math.random() * 400;
  track.style.transform = `translateX(${startX}px)`;
  track.style.transition = 'none';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const duration = 5000 + Math.random() * 1500;
      track.style.transition = `transform ${duration}ms cubic-bezier(0.12, 0, 0.08, 1)`;
      track.style.transform = `translateX(${targetX}px)`;
    });
  });

  setTimeout(() => {
    caseSpinning = false;
    const pickedName = participants[winIdx];
    winnerName = pickedName;

    const cells = track.querySelectorAll('.case-cell');
    cells.forEach((c, i) => c.classList.toggle('highlight', i === centerPos));

    // Remove winner if toggle is on
    const removeWinner = document.getElementById('toggle-remove-winner').checked;
    if (removeWinner) {
      const lowerPicked = pickedName.toLowerCase();
      blacklist.add(lowerPicked);
      participants = participants.filter(p => p.toLowerCase() !== lowerPicked);
      document.getElementById('s-part').textContent = participants.length;
      document.getElementById('btn-open-case').disabled = participants.length === 0;
      renderParticipants();
    }

    setTimeout(() => {
      document.getElementById('case-modal').classList.remove('show');
      revealWinner(pickedName);
      document.getElementById('btn-pick').disabled = false;
      document.getElementById('btn-close-cm').disabled = false;
    }, 900);
  }, 5000 + 2000);
});

function revealWinner(name) {
  winner = name;
  document.getElementById('wb-name').textContent = name;
  document.getElementById('wch-name').textContent = name;
  document.getElementById('winner-overlay').classList.add('show');
  document.getElementById('wchat-box').innerHTML =
    '<div class="wchat-empty">Сообщения появятся здесь...</div>';
  renderParticipants();
}

document.getElementById('win-close').addEventListener('click', () => {
  document.getElementById('winner-overlay').classList.remove('show');
});
document.getElementById('winner-overlay').addEventListener('click', (e) => {
  if (e.target.id === 'winner-overlay') {
    document.getElementById('winner-overlay').classList.remove('show');
  }
});

// ── PARTICIPANTS ────────────────────────────────────────
function renderParticipants() {
  const list = document.getElementById('plist');
  list.innerHTML = '';
  if (!participants.length) {
    list.innerHTML = `<div class="pempty"><svg width="28" height="28" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Участники появятся здесь</div>`;
    return;
  }
  participants.forEach(p => {
    const el = document.createElement('div');
    const isW = winner && p.toLowerCase() === winner.toLowerCase();
    el.className = 'pi' + (isW ? ' winner' : '');
    const c = nickColor(p);
    el.innerHTML = `
      <div class="av" style="background:${c}22;border-color:${c}55;color:${c}">${esc(p[0].toUpperCase())}</div>
      <span class="pn">${esc(p)}</span>
      ${isW ? `<span class="crown"><svg width="14" height="14" viewBox="0 0 24 24" fill="var(--orange)" stroke="none"><path d="M2 20h20M5 20 3 8l5 4 4-7 4 7 5-4-2 12H5z"/></svg></span>` : ''}
      <button class="pi-x" data-nick="${escAttr(p)}" title="Удалить">✕</button>
    `;
    list.appendChild(el);
  });
  list.querySelectorAll('.pi-x').forEach(btn => {
    btn.addEventListener('click', () => removeParticipant(btn.getAttribute('data-nick')));
  });
}

function removeParticipant(nick) {
  if (!nick) return;
  const lower = nick.toLowerCase();
  blacklist.add(lower);
  participants = participants.filter(p => p.toLowerCase() !== lower);
  if (winner && winner.toLowerCase() === lower) {
    winner = null; winnerName = null;
    document.getElementById('winner-overlay').classList.remove('show');
  }
  document.getElementById('s-part').textContent = participants.length;
  document.getElementById('btn-open-case').disabled = participants.length === 0;
  renderParticipants();
}

function plu(n) {
  if (n%10===1&&n%100!==11) return '';
  if (n%10>=2&&n%10<=4&&(n%100<10||n%100>=20)) return 'а';
  return 'ов';
}

// ── IRC ─────────────────────────────────────────────────
let channel = '', keyword = '';

document.getElementById('btn-connect').addEventListener('click', () => {
  const ch = document.getElementById('inp-ch').value.trim().toLowerCase();
  const kw = document.getElementById('inp-kw').value.trim().toLowerCase();
  const err = document.getElementById('err-box');
  if (!ch) { err.textContent='Введите никнейм стримера'; err.classList.add('show'); return; }
  if (participationMode === 'keyword' && !kw) {
    err.textContent='Введите ключевое слово'; err.classList.add('show'); return;
  }
  err.classList.remove('show');
  channel = ch; keyword = kw;
  connectIRC(ch, kw);
  load7TVEmotes(ch);
});

document.getElementById('btn-disconnect').addEventListener('click', () => {
  if (ws) { ws.close(); ws = null; }
  fullReset();
  setDisconnected();
});

document.getElementById('btn-clear').addEventListener('click', () => {
  participants = []; winner = null; winnerName = null;
  blacklist = new Set();
  renderParticipants();
  document.getElementById('s-part').textContent = '0';
  document.getElementById('winner-overlay').classList.remove('show');
  document.getElementById('btn-open-case').disabled = true;
});

function fullReset() {
  participants = []; winner = null; winnerName = null;
  blacklist = new Set(); sevenTVEmotes = {};
  document.getElementById('s-part').textContent = '0';
  document.getElementById('winner-overlay').classList.remove('show');
  document.getElementById('btn-open-case').disabled = true;
  const chatBox = document.getElementById('chat-box');
  chatBox.innerHTML = `<div class="empty-state" id="chat-empty">
    <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Подключитесь к каналу чтобы увидеть чат
  </div>`;
  renderParticipants();
  // Re-enable inputs after disconnect
  setInputsDisabled(false);
}

function setInputsDisabled(disabled) {
  document.getElementById('inp-ch').disabled = disabled;
  document.getElementById('inp-kw').disabled = disabled;
  document.getElementById('mode-kw').disabled = disabled;
  document.getElementById('mode-any').disabled = disabled;
  if (disabled) {
    document.getElementById('mode-kw').style.opacity = '0.4';
    document.getElementById('mode-kw').style.cursor = 'not-allowed';
    document.getElementById('mode-any').style.opacity = '0.4';
    document.getElementById('mode-any').style.cursor = 'not-allowed';
  } else {
    document.getElementById('mode-kw').style.opacity = '';
    document.getElementById('mode-kw').style.cursor = '';
    document.getElementById('mode-any').style.opacity = '';
    document.getElementById('mode-any').style.cursor = '';
  }
}

function connectIRC(ch, kw) {
  if (ws) ws.close();
  setHStatus('Подключение…', false);
  ws = new WebSocket('wss://irc-ws.chat.twitch.tv');
  ws.onopen = () => {
    ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands twitch.tv/membership');
    ws.send('PASS oauth:no_token_needed_for_reading');
    ws.send('NICK justinfan' + Math.floor(Math.random()*99999));
    ws.send('JOIN #' + ch);
  };
  ws.onmessage = e => {
    const lines = e.data.split('\r\n');
    for (const raw of lines) {
      if (!raw) continue;
      if (raw.startsWith('PING')) { ws.send('PONG :tmi.twitch.tv'); continue; }
      if (raw.includes('PRIVMSG')) parseMsg(raw, kw);
      if (raw.includes('366') || raw.includes('JOIN #')) {
        setHStatus('Подключено к #' + ch, true);
        setInputsDisabled(true);
      }
    }
  };
  ws.onerror = () => { showErr('Ошибка подключения к Twitch'); setDisconnected(); };
  ws.onclose = () => { if (ws) setDisconnected(); };
}

function setHStatus(txt, live) {
  document.getElementById('hstatus').textContent = txt;
  document.getElementById('live-badge').classList.toggle('on', live);
  if (live) {
    document.getElementById('btn-connect').style.display = 'none';
    document.getElementById('btn-disconnect').style.display = 'flex';
  }
}
function setDisconnected() {
  setHStatus('Не подключено', false);
  document.getElementById('btn-connect').style.display = 'flex';
  document.getElementById('btn-disconnect').style.display = 'none';
  setInputsDisabled(false);
  ws = null;
}
function showErr(msg) {
  const e = document.getElementById('err-box'); e.textContent = msg; e.classList.add('show');
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return esc(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function parseTags(raw) {
  const tags = {};
  if (!raw.startsWith('@')) return tags;
  const end = raw.indexOf(' ');
  const tagStr = raw.slice(1, end);
  for (const part of tagStr.split(';')) {
    const eq = part.indexOf('=');
    if (eq < 0) continue;
    tags[part.slice(0, eq)] = part.slice(eq + 1);
  }
  return tags;
}

function parseTwitchEmotes(emotesStr) {
  if (!emotesStr) return [];
  const out = [];
  for (const item of emotesStr.split('/')) {
    const [id, ranges] = item.split(':');
    if (!id || !ranges) continue;
    for (const r of ranges.split(',')) {
      const [s, e] = r.split('-').map(Number);
      out.push({ id, start: s, end: e });
    }
  }
  return out.sort((a, b) => a.start - b.start);
}

  staff: `<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" rx="4" fill="#9146ff"/><path d="M4 16L10 4l6 12H4z" fill="white"/></svg>`,
  turbo: `<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" rx="4" fill="#9146ff"/><path d="M11 4L5 11h5l-1 5 6-7h-5l1-5z" fill="white"/></svg>`,
  premium: `<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="20" height="20" rx="4" fill="#009cdc"/><path d="M10 5l1.5 3 3.5.5-2.5 2.5.5 3.5L10 13l-3 1.5.5-3.5L5 8.5 8.5 8 10 5z" fill="white"/></svg>`,
};

function renderBadges(badgesStr) {
  if (!badgesStr) return '';
  let html = '';
  for (const b of badgesStr.split(',')) {
    const [name] = b.split('/');
    const svg = BADGE_SVGS[name];
    if (svg) {
      html += `<span class="badge" title="${esc(name)}">${svg}</span>`;
    }
  }
  return html;
}

function renderMessageHTML(text, twitchEmotes) {
  const codepoints = Array.from(text);
  const segments = [];
  let cursor = 0;
  for (const em of twitchEmotes) {
    if (em.start > cursor) segments.push({ type: 'text', value: codepoints.slice(cursor, em.start).join('') });
    segments.push({
      type: 'emote',
      url: `https://static-cdn.jtvnw.net/emoticons/v2/${em.id}/default/dark/2.0`,
      name: codepoints.slice(em.start, em.end + 1).join('')
    });
    cursor = em.end + 1;
  }
  if (cursor < codepoints.length) segments.push({ type: 'text', value: codepoints.slice(cursor).join('') });
  if (segments.length === 0) segments.push({ type: 'text', value: text });

  let html = '';
  for (const seg of segments) {
    if (seg.type === 'emote') {
      html += `<img class="emote" src="${seg.url}" alt="${escAttr(seg.name)}" title="${escAttr(seg.name)}">`;
    } else {
      const words = seg.value.split(/(\s+)/);
      for (const w of words) {
        if (/^\s+$/.test(w)) { html += w; continue; }
        const em = sevenTVEmotes[w];
        if (em) {
          html += `<img class="emote" src="${em.url}" alt="${escAttr(w)}" title="${escAttr(w)}">`;
        } else {
          html += esc(w);
        }
      }
    }
  }
  return html;
}

function parseMsg(raw, kw) {
  const tags = parseTags(raw);
  const color = tags['color'] || null;
  let nick = tags['display-name'] || '';
  if (!nick) { const nm = raw.match(/:([^!]+)!/); if (nm) nick = nm[1]; }
  if (!nick) nick = 'anonymous';

  const mm = raw.match(/PRIVMSG #\S+ :(.+)$/);
  if (!mm) return;
  const text = mm[1].trim();
  const twitchEmotes = parseTwitchEmotes(tags['emotes'] || '');
  const badges = tags['badges'] || '';

  // Determine if message qualifies
  let qualifies = false;
  if (participationMode === 'keyword') {
    // Must contain keyword as a whole standalone word (case-insensitive)
    // Match keyword as exact word (surrounded by word boundaries or spaces/start/end)
    const kwLower = kw.toLowerCase();
    const textLower = text.toLowerCase();
    // Split by whitespace and check exact match
    const words = textLower.split(/\s+/);
    qualifies = words.some(w => w === kwLower);
  } else {
    // Any message qualifies
    qualifies = true;
  }

  const lowerNick = nick.toLowerCase();
  addChatMsg(nick, text, twitchEmotes, qualifies, color, badges);

  if (winnerName && lowerNick === winnerName.toLowerCase()) {
    addWinnerMsg(nick, text, twitchEmotes, color);
  }

  // Check remove-winner toggle: if winner was removed, they are in blacklist
  const removeWinner = document.getElementById('toggle-remove-winner').checked;
  const alreadyIn = participants.some(p => p.toLowerCase() === lowerNick);
  const inBlacklist = blacklist.has(lowerNick);

  if (qualifies && !inBlacklist && !alreadyIn) {
    participants.push(nick);
    document.getElementById('s-part').textContent = participants.length;
    renderParticipants();
    document.getElementById('btn-open-case').disabled = false;
  }
}

function addChatMsg(nick, text, twitchEmotes, isKw, color, badges) {
  const empty = document.getElementById('chat-empty');
  if (empty) empty.remove();
  const el = document.createElement('div');
  el.className = 'chat-msg' + (isKw ? ' kw' : '');
  const c = color || nickColor(nick);
  const badgeHTML = renderBadges(badges);
  el.innerHTML = `${badgeHTML}<span class="nick" style="color:${c}">${esc(nick)}</span><span class="txt">${renderMessageHTML(text, twitchEmotes)}</span>`;
  const box = document.getElementById('chat-box');
  box.appendChild(el);
  while (box.children.length > 200) box.removeChild(box.firstChild);
  box.scrollTop = box.scrollHeight;
}

function addWinnerMsg(nick, text, twitchEmotes, color) {
  const box = document.getElementById('wchat-box');
  const empty = box.querySelector('.wchat-empty');
  if (empty) empty.remove();
  const el = document.createElement('div');
  el.className = 'chat-msg';
  const c = color || nickColor(nick);
  el.innerHTML = `<span class="nick" style="color:${c}">${esc(nick)}</span><span class="txt">${renderMessageHTML(text, twitchEmotes)}</span>`;
  box.appendChild(el);
  while (box.children.length > 80) box.removeChild(box.firstChild);
  box.scrollTop = box.scrollHeight;
}

// ── 7TV ────────────────────────────────────────────────
async function load7TVEmotes(login) {
  sevenTVEmotes = {};
  try {
    let twitchId = null;
    try {
      const r = await fetch('https://decapi.me/twitch/id/' + encodeURIComponent(login));
      if (r.ok) { const txt = (await r.text()).trim(); if (/^\d+$/.test(txt)) twitchId = txt; }
    } catch (_) {}
    try {
      const rg = await fetch('https://7tv.io/v3/emote-sets/global');
      if (rg.ok) { const data = await rg.json(); addEmoteSet(data && data.emotes); }
    } catch (_) {}
    if (twitchId) {
      try {
        const ru = await fetch('https://7tv.io/v3/users/twitch/' + twitchId);
        if (ru.ok) { const u = await ru.json(); addEmoteSet(u && u.emote_set && u.emote_set.emotes); }
      } catch (_) {}
    }
  } catch (_) {}
}

function addEmoteSet(arr) {
  if (!Array.isArray(arr)) return;
  for (const em of arr) {
    if (!em || !em.name) continue;
    let host = em.data && em.data.host && em.data.host.url;
    if (!host) host = `//cdn.7tv.app/emote/${em.id}`;
    if (host.startsWith('//')) host = 'https:' + host;
    sevenTVEmotes[em.name] = { url: `${host}/2x.webp`, animated: !!(em.data && em.data.animated) };
  }
}
